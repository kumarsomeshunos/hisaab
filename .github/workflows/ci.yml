name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Drizzle ORM imports are resolved at build time but no DB connection
          # is made during a static build — a placeholder value is sufficient.
          DATABASE_URL: postgresql://dummy:dummy@localhost/dummy
          NEXT_PUBLIC_APP_URL: http://localhost:3000
